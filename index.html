<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Multi-Model Showcase</title>
  
  <!-- Google <model-viewer> Engine -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <!-- Google Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />

  <style>
    :root {
      --bg-color: #121316;
      --card-bg: rgba(24, 26, 32, 0.88);
      --accent-color: #1caad9; /* Sketchfab Blue */
      --text-main: #ffffff;
      --text-muted: #a0a5b1;
      --border-color: rgba(255, 255, 255, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      user-select: none;
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: var(--bg-color);
      color: var(--text-main);
    }

    .viewer-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    model-viewer {
      width: 100%;
      height: 100%;
      --poster-color: transparent;
      background: radial-gradient(circle at center, #2a2d35 0%, #111215 100%);
    }

    /* Top Navigation Header */
    .header {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
      pointer-events: none;
    }

    .header-info {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      padding: 12px 20px;
      border-radius: 12px;
      pointer-events: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .header-info h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .header-info p {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .btn-action {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 10px 16px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      pointer-events: auto;
      transition: all 0.2s ease;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .btn-action:hover {
      background: var(--accent-color);
      border-color: var(--accent-color);
    }

    /* Model Selector Buttons Bar (Horizontal Scrollable) */
    .model-selector-container {
      position: absolute;
      top: 80px;
      left: 16px;
      right: 16px;
      z-index: 10;
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 8px;
      scrollbar-width: thin;
      scrollbar-color: var(--accent-color) transparent;
    }

    .model-btn {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .model-btn:hover {
      color: var(--text-main);
      border-color: var(--accent-color);
    }

    .model-btn.active {
      background: var(--accent-color);
      color: #ffffff;
      border-color: var(--accent-color);
      box-shadow: 0 0 12px rgba(28, 170, 217, 0.4);
    }

    /* Bottom Control Bar */
    .toolbar {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      padding: 8px 12px;
      border-radius: 30px;
      display: flex;
      gap: 8px;
      z-index: 10;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    .tool-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .tool-btn:hover, .tool-btn.active {
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.1);
    }

    .tool-btn.active {
      color: var(--accent-color);
    }

    /* Toast Notification */
    .toast {
      position: absolute;
      bottom: 80px;
      right: 20px;
      background: var(--accent-color);
      color: #fff;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s ease;
      z-index: 20;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* Progress Bar */
    .progress-bar {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.1);
      z-index: 30;
    }

    .update-bar {
      background: var(--accent-color);
      width: 0%;
      height: 100%;
      transition: width 0.1s ease;
    }
  </style>
</head>
<body>

  <div class="viewer-container">
    <div class="progress-bar">
      <div class="update-bar" id="progress"></div>
    </div>

    <!-- Header Overlay -->
    <div class="header">
      <div class="header-info">
        <h1 id="modelTitle">Loading Models...</h1>
        <p id="modelSubtitle">Interactive 3D Asset Showcase</p>
      </div>
      <button class="btn-action" id="shareBtn">
        <span class="material-icons-round">share</span> Share Model Link
      </button>
    </div>

    <!-- Dynamic Model Switcher Buttons -->
    <div class="model-selector-container" id="modelSelector"></div>

    <!-- 3D Engine -->
    <model-viewer 
      id="3dViewer"
      alt="3D Asset" 
      camera-controls 
      auto-rotate 
      shadow-intensity="1.5"
      shadow-softness="0.8"
      exposure="1.0"
      environment-image="neutral"
      ar>
    </model-viewer>

    <!-- Bottom Controls Toolbar -->
    <div class="toolbar">
      <button class="tool-btn active" id="rotateToggle" title="Toggle Auto-Rotate">
        <span class="material-icons-round">sync</span>
      </button>
      <button class="tool-btn" id="lightToggle" title="Toggle Studio Lighting">
        <span class="material-icons-round">light_mode</span>
      </button>
      <button class="tool-btn" id="resetCam" title="Reset Camera View">
        <span class="material-icons-round">center_focus_strong</span>
      </button>
      <button class="tool-btn" id="fullscreenToggle" title="Toggle Fullscreen">
        <span class="material-icons-round">fullscreen</span>
      </button>
    </div>

    <div class="toast" id="toast">Direct link copied to clipboard!</div>
  </div>

  <script>
    const viewer = document.querySelector('#3dViewer');
    const modelSelector = document.querySelector('#modelSelector');
    const modelTitle = document.querySelector('#modelTitle');
    const progressBar = document.querySelector('#progress');

    // Default list of models in case API detection is offline/testing locally
    const FALLBACK_MODELS = ["model1.glb", "model2.glb"]; 

    // Function to format GLB filenames into clean titles
    function formatTitle(filename) {
      return filename
        .replace(/\.glb$/i, '')
        .replace(/[-_]/g, ' ')
        .replace(/\b\w/g, c => c.toUpperCase());
    }

    // Load a selected model into the 3D Viewer
    function loadModel(filename, buttonElement) {
      viewer.src = filename;
      modelTitle.innerText = formatTitle(filename);

      // Update URL search parameters without reloading page
      const url = new URL(window.location);
      url.searchParams.set('model', filename);
      window.history.pushState({}, '', url);

      // Active state styling for buttons
      document.querySelectorAll('.model-btn').forEach(btn => btn.classList.remove('active'));
      if (buttonElement) buttonElement.classList.add('active');
    }

    // Create buttons dynamically
    function renderModelButtons(modelList) {
      modelSelector.innerHTML = '';
      if (!modelList || modelList.length === 0) return;

      const urlParams = new URLSearchParams(window.location.search);
      const requestedModel = urlParams.get('model');

      modelList.forEach((filename, index) => {
        const btn = document.createElement('button');
        btn.className = 'model-btn';
        btn.innerHTML = `<span class="material-icons-round" style="font-size:16px;">view_in_ar</span> ${formatTitle(filename)}`;
        btn.onclick = () => loadModel(filename, btn);
        modelSelector.appendChild(btn);

        // Auto-select requested model OR default to the FIRST model in folder
        if (requestedModel === filename || (!requestedModel && index === 0)) {
          loadModel(filename, btn);
        }
      });
    }

    // Auto-detect all .glb files from GitHub API
    async function fetchRepoModels() {
      const hostname = window.location.hostname;
      const pathSegments = window.location.pathname.split('/').filter(Boolean);

      // If running live on GitHub Pages (e.g. username.github.io/repo)
      if (hostname.includes('.github.io') && pathSegments.length > 0) {
        const username = hostname.split('.')[0];
        const repo = pathSegments[0];

        try {
          const res = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/`);
          if (res.ok) {
            const files = await res.json();
            const glbFiles = files
              .filter(file => file.name.toLowerCase().endsWith('.glb'))
              .map(file => file.name);

            if (glbFiles.length > 0) {
              renderModelButtons(glbFiles);
              return;
            }
          }
        } catch (e) {
          console.warn('GitHub API fetch failed, falling back to manual list.', e);
        }
      }

      // Fallback if local or if API limit reached
      renderModelButtons(FALLBACK_MODELS);
    }

    // Initialize page
    fetchRepoModels();

    // Progress Bar Indicator
    viewer.addEventListener('progress', (e) => {
      const progress = e.detail.totalProgress * 100;
      progressBar.style.width = `${progress}%`;
      if (progress === 100) {
        setTimeout(() => progressBar.style.width = '0%', 300);
      }
    });

    // Control Buttons logic
    document.querySelector('#rotateToggle').addEventListener('click', function() {
      viewer.autoRotate = !viewer.autoRotate;
      this.classList.toggle('active', viewer.autoRotate);
    });

    document.querySelector('#lightToggle').addEventListener('click', function() {
      const current = parseFloat(viewer.exposure) || 1.0;
      viewer.exposure = current === 1.0 ? 2.0 : 1.0;
      this.classList.toggle('active', viewer.exposure === 2.0);
    });

    document.querySelector('#resetCam').addEventListener('click', () => {
      viewer.cameraOrbit = 'auto auto auto';
      viewer.cameraTarget = 'auto auto auto';
    });

    document.querySelector('#fullscreenToggle').addEventListener('click', () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    });

    document.querySelector('#shareBtn').addEventListener('click', () => {
      navigator.clipboard.writeText(window.location.href).then(() => {
        const toast = document.querySelector('#toast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
      });
    });
  </script>
</body>
</html>
